<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WANTED — Cowboy Hangman</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Special+Elite&display=swap"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="grain"></div>

  <div class="page">

    <!-- HEADER -->
    <header class="site-header">
      <div class="wanted-badge">
        <span class="star">✦</span>
        <h1 class="title">WANTED</h1>
        <span class="star">✦</span>
      </div>
      <p class="subtitle">DEAD OR ALIVE — GUESS THE WORD</p>
      <div class="divider"></div>
    </header>

    <!-- MAIN STAGE -->
    <main class="stage">

      <!-- COWBOY CHARACTER + GALLOWS -->
      <div class="gallows-wrap">
        <svg id="scene" viewBox="0 0 420 520" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <!-- Light blue-white fill gradient (matches reference) -->
            <linearGradient id="fill-grad" x1="30%" y1="0%" x2="70%" y2="100%">
              <stop offset="0%"   stop-color="#ddeeff"/>
              <stop offset="40%"  stop-color="#c8dff5"/>
              <stop offset="100%" stop-color="#a8c8e8"/>
            </linearGradient>
            <linearGradient id="fill-light" x1="20%" y1="0%" x2="80%" y2="100%">
              <stop offset="0%"   stop-color="#eef5ff"/>
              <stop offset="100%" stop-color="#c0d8f0"/>
            </linearGradient>
            <!-- Glow around whole figure -->
            <filter id="fig-glow" x="-30%" y="-30%" width="160%" height="160%">
              <feGaussianBlur stdDeviation="8" result="blur"/>
              <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
              </feMerge>
            </filter>
          </defs>

          <!-- ═══ GALLOWS (always visible) ═══ -->
          <line x1="20"  y1="510" x2="400" y2="510" class="g-wood"/>
          <line x1="75"  y1="510" x2="75"  y2="25"  class="g-wood"/>
          <line x1="75"  y1="25"  x2="245" y2="25"  class="g-wood"/>
          <line x1="245" y1="25"  x2="245" y2="72"  class="g-rope"/>

          <!-- ══════════════════════════════════
               COWBOY FIGURE — thick outline style
               Parts reveal one by one
          ══════════════════════════════════ -->

          <!-- ── LEFT LEG ── -->
          <g id="p-lleg" class="figure hidden" filter="url(#fig-glow)">
            <!-- Thigh -->
            <line x1="215" y1="355" x2="200" y2="430" stroke="#111" stroke-width="14" stroke-linecap="round"/>
            <!-- Shin (angled out) -->
            <line x1="200" y1="430" x2="185" y2="490" stroke="#111" stroke-width="13" stroke-linecap="round"/>
            <!-- Boot shape -->
            <path d="M168 478 Q172 498 195 500 Q215 502 218 492 Q210 488 200 482 L185 490 Z"
                  fill="url(#fill-grad)" stroke="#111" stroke-width="5" stroke-linejoin="round"/>
            <!-- Boot toe bump -->
            <circle cx="170" cy="494" r="9" fill="url(#fill-grad)" stroke="#111" stroke-width="5"/>
            <!-- Inner fill on leg -->
            <line x1="215" y1="355" x2="200" y2="430" stroke="url(#fill-grad)" stroke-width="6" stroke-linecap="round"/>
            <line x1="200" y1="430" x2="185" y2="490" stroke="url(#fill-grad)" stroke-width="5" stroke-linecap="round"/>
          </g>

          <!-- ── RIGHT LEG ── -->
          <g id="p-rleg" class="figure hidden" filter="url(#fig-glow)">
            <line x1="255" y1="355" x2="272" y2="430" stroke="#111" stroke-width="14" stroke-linecap="round"/>
            <line x1="272" y1="430" x2="285" y2="490" stroke="#111" stroke-width="13" stroke-linecap="round"/>
            <path d="M302 478 Q298 498 275 500 Q255 502 252 492 Q260 488 270 482 L285 490 Z"
                  fill="url(#fill-grad)" stroke="#111" stroke-width="5" stroke-linejoin="round"/>
            <circle cx="300" cy="494" r="9" fill="url(#fill-grad)" stroke="#111" stroke-width="5"/>
            <line x1="255" y1="355" x2="272" y2="430" stroke="url(#fill-grad)" stroke-width="6" stroke-linecap="round"/>
            <line x1="272" y1="430" x2="285" y2="490" stroke="url(#fill-grad)" stroke-width="5" stroke-linecap="round"/>
          </g>

          <!-- ── BODY (torso) ── -->
          <g id="p-body" class="figure hidden" filter="url(#fig-glow)">
            <!-- Torso rounded rect — like the reference -->
            <rect x="192" y="230" width="86" height="130" rx="30" ry="28"
                  fill="url(#fill-light)" stroke="#111" stroke-width="9"/>
            <!-- Inner highlight stripe -->
            <rect x="208" y="240" width="28" height="110" rx="14"
                  fill="#ffffff" opacity="0.35"/>
            <!-- Neck connector -->
            <line x1="235" y1="230" x2="235" y2="210" stroke="#111" stroke-width="11" stroke-linecap="round"/>
            <line x1="235" y1="230" x2="235" y2="210" stroke="url(#fill-light)" stroke-width="4" stroke-linecap="round"/>
          </g>

          <!-- ── LEFT ARM ── -->
          <g id="p-larm" class="figure hidden" filter="url(#fig-glow)">
            <!-- Upper arm -->
            <line x1="196" y1="255" x2="148" y2="300" stroke="#111" stroke-width="13" stroke-linecap="round"/>
            <!-- Forearm (raised up like reference) -->
            <line x1="148" y1="300" x2="110" y2="255" stroke="#111" stroke-width="12" stroke-linecap="round"/>
            <!-- Inner fill -->
            <line x1="196" y1="255" x2="148" y2="300" stroke="url(#fill-grad)" stroke-width="5" stroke-linecap="round"/>
            <line x1="148" y1="300" x2="110" y2="255" stroke="url(#fill-grad)" stroke-width="4" stroke-linecap="round"/>
            <!-- Hand -->
            <circle cx="108" cy="250" r="14" fill="url(#fill-grad)" stroke="#111" stroke-width="7"/>
          </g>

          <!-- ── RIGHT ARM ── -->
          <g id="p-rarm" class="figure hidden" filter="url(#fig-glow)">
            <!-- Upper arm -->
            <line x1="274" y1="255" x2="318" y2="295" stroke="#111" stroke-width="13" stroke-linecap="round"/>
            <!-- Forearm (raised) -->
            <line x1="318" y1="295" x2="355" y2="250" stroke="#111" stroke-width="12" stroke-linecap="round"/>
            <line x1="274" y1="255" x2="318" y2="295" stroke="url(#fill-grad)" stroke-width="5" stroke-linecap="round"/>
            <line x1="318" y1="295" x2="355" y2="250" stroke="url(#fill-grad)" stroke-width="4" stroke-linecap="round"/>
            <!-- Hand -->
            <circle cx="357" cy="245" r="14" fill="url(#fill-grad)" stroke="#111" stroke-width="7"/>
          </g>

          <!-- ── HEAD + HAT ── -->
          <g id="p-head" class="figure hidden" filter="url(#fig-glow)">
            <!-- Head circle -->
            <circle cx="235" cy="175" r="42"
                    fill="url(#fill-light)" stroke="#111" stroke-width="9"/>
            <!-- Face highlight -->
            <ellipse cx="224" cy="165" rx="16" ry="20" fill="#ffffff" opacity="0.3"/>

            <!-- COWBOY HAT — wide brim + pinched crown like reference -->
            <!-- Brim (wide ellipse) -->
            <ellipse cx="235" cy="140" rx="72" ry="16"
                     fill="url(#fill-grad)" stroke="#111" stroke-width="8"/>
            <!-- Crown left side -->
            <path d="M175 138 Q178 90 210 82 Q235 76 235 76 Q235 76 260 82 Q292 90 295 138"
                  fill="url(#fill-grad)" stroke="#111" stroke-width="8" stroke-linejoin="round"/>
            <!-- Crown top pinch dip (cowboy hat indent) -->
            <path d="M210 82 Q225 92 235 76 Q245 92 260 82"
                  fill="none" stroke="#111" stroke-width="6" stroke-linecap="round"/>
            <!-- Hat highlight -->
            <ellipse cx="220" cy="100" rx="18" ry="14" fill="#ffffff" opacity="0.22"/>
            <!-- Hat band -->
            <ellipse cx="235" cy="138" rx="58" ry="10" fill="none" stroke="#cc2200" stroke-width="5" opacity="0.7"/>

            <!-- Eyes -->
            <circle cx="222" cy="178" r="5" fill="#1a2744" opacity="0.7"/>
            <circle cx="248" cy="178" r="5" fill="#1a2744" opacity="0.7"/>
            <circle cx="220" cy="176" r="2" fill="#fff" opacity="0.8"/>
            <circle cx="246" cy="176" r="2" fill="#fff" opacity="0.8"/>

            <!-- Smile -->
            <path d="M222 192 Q235 202 248 192" fill="none" stroke="#1a2744" stroke-width="3.5"
                  stroke-linecap="round" opacity="0.5"/>
          </g>

          <!-- Shadow -->
          <ellipse id="p-shadow" cx="235" cy="508" rx="75" ry="7"
                   fill="#1a2744" opacity="0.25" class="figure hidden"/>

        </svg>
      </div>

      <!-- LIVES -->
      <div class="lives-row">
        <span id="hearts-display" class="hearts-display">♥ ♥ ♥ ♥ ♥ ♥</span>
        <span class="lives-text">LIVES: <strong id="lives-count">6</strong></span>
      </div>

      <!-- WORD DISPLAY -->
      <div id="word-display" class="word-display"></div>

      <!-- WRONG LETTERS -->
      <div class="wrong-row">
        <span class="wrong-label">WRONG GUESSES:</span>
        <span id="wrong-letters" class="wrong-letters">—</span>
      </div>

      <!-- MESSAGE -->
      <div id="message" class="message"></div>

      <!-- KEYBOARD -->
      <div id="keyboard" class="keyboard"></div>

      <!-- NEW GAME -->
      <button class="new-game-btn" onclick="initGame()">&#8635; NEW GAME</button>

    </main>

    <footer class="site-footer">
      <div class="divider"></div>
      <p>&#9733; DEAD OR ALIVE &#9733;</p>
    </footer>

  </div>

  <script src="script.js"></script>
</body>
</html>
